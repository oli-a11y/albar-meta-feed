name: Update Meta Feed

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch: # Allows you to run it manually by clicking a button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # <-- Updated to v4!

    - name: Set up Python
      uses: actions/setup-python@v5 # <-- Updated to v5!
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run translator script
      run: python translator.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add meta_feed.csv
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Meta feed"
        git push
